{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Portafolio | {{ name|default:'Mi Portafolio' }}</title>

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- AOS (Animaciones) -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'portfolio/images/favicon.png' %}" />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}" />
  </head>

  <body>

    <!-- Fondo animado -->
    <div id="floating-container"></div>

    <!-- ================= NAVBAR ================= -->
    <header>
      <nav class="navbar" data-aos="fade-down">

        <div class="brand">
          <a href="{% url 'portfolio:home' %}">
            <i class="fas fa-code"></i> Portafolio
          </a>
        </div>

        <!-- TOGGLE MOBILE -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle" />
        <label for="nav-toggle" class="nav-toggle-label">
          <span></span>
        </label>

        <!-- LINKS -->
        <ul class="nav-links">
          <li><a href="{% url 'portfolio:home' %}">Inicio</a></li>
          <li><a href="{% url 'portfolio:experience' %}">Experiencia</a></li>
          <li><a href="{% url 'portfolio:education' %}">Estudios</a></li>
          <li><a href="{% url 'portfolio:skills' %}">Habilidades</a></li>
          <li><a href="{% url 'portfolio:contact' %}">Contacto</a></li>
        </ul>

      </nav>
    </header>

    <!-- ================= CONTENIDO ================= -->
    <main>
      {% block content %}{% endblock %}
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
      <p>© {{ now|date:"Y" }} {{ name|default:'Tu Nombre' }}. Todos los derechos reservados.</p>
    </footer>

    <!-- JS PRINCIPAL -->
    <script src="{% static 'portfolio/js/script.js' %}"></script>

    <!-- AOS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 800,
        once: true
      });
    </script>

    <!-- NAVBAR SCROLL EFFECT -->
    <script>
      window.addEventListener("scroll", function () {
        const navbar = document.querySelector(".navbar");
        navbar.classList.toggle("scrolled", window.scrollY > 50);
      });
    </script>

  </body>
</html>
